name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths: ['supabase/functions/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: |
          PUBLIC_FN="validate-code validate-and-activate"
          for fn in supabase/functions/*/; do
            slug=$(basename "$fn")
            if echo "$PUBLIC_FN" | grep -qw "$slug"; then
              echo "Deploying $slug (public)..."
              supabase functions deploy "$slug" --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --use-api --no-verify-jwt
            else
              echo "Deploying $slug..."
              supabase functions deploy "$slug" --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --use-api
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
